<!DOCTYPE html> 
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Iniciar sesión</title>
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<div class="login-container">
  <div class="login-box-form">
    <h2>Iniciar sesión</h2>

    <!-- Nombre de usuario -->
    <input type="text" id="loginUsername" placeholder="Nombre de usuario" required>

    <div class="password-wrapper">
      <input type="password" id="loginPassword" placeholder="Contraseña" required>
      <label class="mostrar-password">
        <input type="checkbox" onclick="togglePassword('loginPassword')">
        Mostrar
      </label>
    </div>

    <button class="btn-form" onclick="login()">Entrar</button>

    <p style="text-align:center; margin-top:15px;">
      ¿No tienes cuenta?
      <a href="registro.html">Crear cuenta</a>
    </p>
  </div>
</div>

<script src="js/jsauth.js"></script>
</body>
</html>

if (encontrado.banHasta && Date.now() < encontrado.banHasta) {
  alert("Tu cuenta está baneada");
  return;
}
